<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale-1.0">
    <title>Second Brain - Design Concepts</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --text: #e0e0e0;
            --accent: #3b82f6;
            --card-bg: #1a1a1a;
        }
        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
        }
        .container {
            text-align: center;
            max-width: 600px;
        }
        h1 {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            background: linear-gradient(to bottom right, #fff, #666);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            font-size: 1.2rem;
            color: #888;
            margin-bottom: 3rem;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 1rem;
            width: 100%;
        }
        .nav-link {
            text-decoration: none;
            color: var(--text);
            background: var(--card-bg);
            padding: 1.5rem 1rem;
            border-radius: 12px;
            border: 1px solid #333;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }
        .nav-link:hover {
            border-color: var(--accent);
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.2);
        }
        .nav-link span {
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .nav-link .icon {
            font-size: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Second Brain</h1>
        <p>Select a design language to explore the interface.</p>
        <nav class="grid">
            <a href="pages/one.html" class="nav-link">
                <div class="icon">🧱</div>
                <span>Brutalist</span>
            </a>
            <a href="pages/two.html" class="nav-link">
                <div class="icon">✨</div>
                <span>Cyber-Zen</span>
            </a>
            <a href="pages/three.html" class="nav-link">
                <div class="icon">📖</div>
                <span>Editorial</span>
            </a>
            <a href="pages/four.html" class="nav-link">
                <div class="icon">📟</div>
                <span>Retro-Futur</span>
            </a>
            <a href="pages/five.html" class="nav-link">
                <div class="icon">🌿</div>
                <span>Organic</span>
            </a>
        </nav>
    </div>
</body>
</html>
