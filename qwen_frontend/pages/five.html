<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design 5: Organic/Natural (Soft & Zen)</title>
    <style>
        :root {
            --bg: #fdfaf6;
            --text: #4a4a4a;
            --accent: #8da399;
            --soft-bg: #f4efea;
        }
        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Optima', 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 2rem;
        }
        .canvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 20% 30%, #e8f0eb 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, #f0e8e8 0%, transparent 40%);
            opacity: 0.6;
        }
        h1 {
            font-size: 4rem;
            font-weight: 300;
            letter-spacing: -1px;
            margin-bottom: 1rem;
            color: #333;
        }
        p {
            font-size: 1.2rem;
            max-width: 500px;
            margin: 0 auto 3rem auto;
            line-height: 1.6;
            color: #777;
        }
        .card {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(10px);
            padding: 2rem;
            border-radius: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.03);
            border: 1px solid rgba(255,255,255,0.8);
            max-width: 400px;
        }
        .btn {
            display: inline-block;
            padding: 1rem 2.5rem;
            background: var(--accent);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 500;
            transition: transform 0.3s ease;
        }
        .btn:hover {
            transform: translateY(-3px);
        }
        .switch-btn {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            color: #bbb;
            text-decoration: none;
            font-size: 0.8rem;
        }
        .switch-btn:hover {
            color: var(--accent);
        }
    </style>
</head>
<body>
    <div class="canvas"></div>
    <div class="card">
        <h1>Ethereal</h1>
        <p>A calm space for your thoughts to breathe and grow.</p>
        <a href="#" class="btn">Begin Reflection</a>
    </div>
    <a href="../index.html" class="switch-btn">Back to index</a>
</body>
</html>
