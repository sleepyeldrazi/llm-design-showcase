<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Second Brain - Iteration 4: Elegant/Academic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2 { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body class="bg-[#fdfcf8] text-[#333] min-h-screen flex flex-col items-center justify-center p-6">
    <nav class="fixed top-6 right-6 flex gap-2 bg-white/50 backdrop-blur-sm border border-stone-200 p-1 rounded-full shadow-sm">
        <a href="one.html" class="px-3 py-1 text-xs rounded-full hover:bg-stone-100 transition">1</a>
        <a href="two.html" class="px-3 py-1 text-xs rounded-full hover:bg-stone-100 transition">2</a>
        <a href="three.html" class="px-3 py-1 text-xs rounded-full hover:bg-stone-100 transition">3</a>
        <a href="four.html" class="px-3 py-1 text-xs rounded-full hover:bg-stone-100 transition">4</a>
        <a href="five.html" class="px-3 py-1 text-xs rounded-full hover:bg-stone-100 transition">5</a>
    </nav>

    <div class="max-w-2xl text-center">
        <div class="mb-8">
            <span class="text-xs uppercase tracking-[0.3em] text-stone-400">The Archivist</span>
        </div>
        <h1 class="text-5xl md:text-6xl mb-6 text-stone-800">A Repository of Thought</h1>
        <p class="text-lg md:text-xl text-stone-500 italic mb-12 font-light">"The written word is the only way to hold the world in place."</p>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 text-left">
            <div class="border-t border-stone-200 pt-4">
                <h3 class="text-sm font-bold mb-2">Curation</h3>
                <p class="text-sm text-stone-500 leading-relaxed">Organize your most profound insights with timeless elegance.</p>
            </div>
            <div class="border-t border-stone-200 pt-4">
                <h3 class="text-sm font-bold mb-2">Reflection</h3>
                <p class="text-sm text-stone-500 leading-relaxed">A quiet space for deep thought and slow, meaningful connection.</p>
            </div>
        </div>

        <button class="mt-16 px-10 py-4 bg-stone-800 text-stone-50 rounded-none hover:bg-stone-700 transition-colors duration-500">
            Begin Your Collection
        </button>
    </div>

    <div class="fixed bottom-0 left-0 w-full h-1 bg-stone-100"></div>
</body>
</html>
