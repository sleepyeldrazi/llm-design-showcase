<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Second Brain - Iteration 5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }
        .float-anim { animation: float 6s ease-in-out infinite; }
    </style>
</head>
<body class="bg-black min-h-screen flex flex-col text-white overflow-hidden">
    <nav class="p-6 flex justify-between items-center z-10">
        <div class="text-2xl font-black tracking-tighter bg-clip-text text-transparent bg-gradient-to-r from-purple-400 to-pink-600">NEURALIS <span class="text-xs font-normal text-white/30">v5</span></div>
        <div class="flex items-center space-x-2 bg-white/5 backdrop-blur-md p-1.5 rounded-full border border-white/10">
            <a href="../one/index.html" class="w-8 h-8 flex items-center justify-center hover:bg-white/10 rounded-full transition text-sm">1</a>
            <a href="../two/index.html" class="w-8 h-8 flex items-center justify-center hover:bg-white/10 rounded-full transition text-sm">2</a>
            <a href="../three/index.html" class="w-8 h-8 flex items-center justify-center hover:bg-white/10 rounded-full transition text-sm">3</a>
            <a href="../four/index.html" class="w-8 h-8 flex items-center justify-center hover:bg-white/10 rounded-full transition text-sm">4</a>
            <a href="../five/index.html" class="w-8 h-8 flex items-center justify-center bg-white/20 rounded-full text-sm">5</a>
        </div>
    </nav>

    <main class="flex-grow flex items-center justify-center relative">
        <!-- Background Glows -->
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-gradient-to-r from-purple-600/20 to-pink-600/20 rounded-full blur-[120px] -z-10"></div>
        <div class="absolute top-1/4 right-1/4 w-[400px] h-[400px] bg-blue-600/10 rounded-full blur-[100px] -z-10"></div>
        
        <div class="text-center px-4">
            <div class="relative inline-block mb-8">
                <div class="absolute -inset-4 bg-gradient-to-r from-purple-500 to-pink-500 rounded-full blur-xl opacity-50 animate-pulse"></div>
                <div class="relative w-32 h-32 bg-black rounded-full flex items-center justify-center border border-white/20 float-anim">
                    <span class="text-5xl">✨</span>
                </div>
            </div>
            
            <h1 class="text-7xl font-black mb-6 tracking-tighter leading-none">
                Beyond <span class="bg-clip-text text-transparent bg-gradient-to-r from-purple-400 via-pink-400 to-red-400">Thinking</span>
            </h1>
            <p class="text-xl text-white/50 max-w-xl mx-auto mb-12 font-light tracking-wide">
                The final frontier of personal intelligence. A symbiotic extension of your consciousness.
            </p>
            
            <div class="flex flex-col sm:flex-row items-center justify-center gap-4">
                <button class="group relative px-10 py-4 bg-white text-black rounded-full font-bold text-lg transition-all hover:scale-105 active:scale-95 overflow-hidden">
                    <span class="relative z-10">Ascend Now</span>
                    <div class="absolute inset-0 bg-gradient-to-r from-purple-400 to-pink-400 opacity-0 group-hover:opacity-20 transition-opacity"></div>
                </button>
                <button class="px-10 py-4 bg-transparent border border-white/20 rounded-full font-semibold text-lg hover:bg-white/5 transition">Explore Ecosystem</button>
            </div>
        </div>

        <!-- Floating particles effect (simulated with CSS) -->
        <div class="absolute bottom-10 left-10 w-2 h-2 bg-white/20 rounded-full blur-sm animate-pulse"></div>
        <div class="absolute top-20 right-20 w-3 h-3 bg-purple-500/20 rounded-full blur-sm animate-bounce"></div>
        <div class="absolute bottom-40 left-1/3 w-1 h-1 bg-white/40 rounded-full"></div>
    </main>

    <footer class="p-8 text-center text-white/20 text-sm font-light">
        &copy; 2026 Neuralis Intelligence Systems
    </footer>
</body>
</html>
