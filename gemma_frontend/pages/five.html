<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethereal | Second Brain</title>
    <style>
        :root {
            --bg: #0a0a0c;
            --fg: #e0e0ff;
            --accent: #a5b4fc;
            --glow: rgba(165, 180, 252, 0.3);
        }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Optima', 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--fg);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow: hidden;
        }
        .mesh {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(165, 180, 252, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(165, 180, 252, 0.05) 0%, transparent 40%);
            z-index: 0;
        }
        .aurora {
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at center, var(--glow) 0%, transparent 50%);
            filter: blur(100px);
            opacity: 0.3;
            animation: drift 20s infinite alternate ease-in-out;
            z-index: 1;
        }
        @keyframes drift {
            from { transform: translate(0, 0); }
            to { transform: translate(5%, 5%); }
        }
        header {
            padding: 2rem;
            text-align: center;
            z-index: 10;
        }
        .logo {
            font-size: 0.8rem;
            letter-spacing: 0.8em;
            text-transform: uppercase;
            opacity: 0.5;
        }
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            text-align: center;
            padding: 2rem;
        }
        h1 {
            font-size: 4rem;
            font-weight: 200;
            letter-spacing: -0.02em;
            margin-bottom: 1rem;
            background: linear-gradient(to bottom, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtext {
            font-size: 1.2rem;
            color: var(--accent);
            opacity: 0.8;
            max-width: 400px;
            line-height: 1.6;
        }
        .nav-switch {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            display: flex;
            gap: 0.5rem;
            z-index: 100;
        }
        .nav-btn {
            background: rgba(255, 255, 255, 0.05);
            color: var(--fg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0.5rem 1rem;
            text-decoration: none;
            font-size: 0.7rem;
            backdrop-filter: blur(10px);
            transition: all 0.4s ease;
        }
        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent);
        }
        .nav-btn.active {
            background: var(--accent);
            color: var(--bg);
            border-color: var(--accent);
        }
        .floating-orb {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: var(--glow);
            filter: blur(50px);
            z-index: 2;
            animation: pulse 8s infinite ease-in-out;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.5); opacity: 0.5; }
        }
    </style>
</head>
<body>
    <div class="mesh"></div>
    <div class="aurora"></div>
    <div class="floating-orb" style="top: 20%; left: 20%;"></div>
    <div class="floating-orb" style="bottom: 20%; right: 20%; animation-delay: -4s;"></div>
    
    <header>
        <div class="logo">Ether</div>
    </header>
    <main>
        <h1>Ascend.</h1>
        <div class="subtext">
            A cognitive sanctuary where thoughts become light. A second brain, weightless and infinite.
        </div>
    </main>
    <div class="nav-switch">
        <a href="../index.html" class="nav-btn">BACK</a>
        <a href="one.html" class="nav-btn">01</a>
        <a href="two.html" class="nav-btn">02</a>
        <a href="three.html" class="nav-btn">03</a>
        <a href="four.html" class="nav-btn">04</a>
        <a href="five.html" class="nav-btn active">05</a>
    </div>
</body>
</html>
